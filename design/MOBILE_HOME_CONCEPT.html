<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLV - Mobile First Concept</title>
    <!-- Ưu tiên font hỗ trợ tiếng Việt cực tốt -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #FFFFFF;
            --gold: #B5945B;
            --dark: #121212;
            --gray-light: #F7F7F7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg);
            color: var(--dark);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* MOBILE HEADER */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
            border-bottom: 1px solid #eee;
            transition: all 0.3s ease;
        }

        .menu-icon {
            width: 24px;
            height: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-icon span {
            height: 2px;
            width: 100%;
            background: var(--dark);
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .search-icon {
            font-size: 20px;
        }

        /* HERO - SHOWCASE */
        .hero {
            padding: 20px;
        }

        .hero-card {
            background: var(--gray-light);
            border-radius: 20px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .hero-img {
            position: absolute;
            top: 0;
            right: -20px;
            width: 280px;
            transform: rotate(10deg);
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.1));
        }

        .hero-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 34px;
            line-height: 1;
            margin-bottom: 15px;
        }

        .hero-btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            width: fit-content;
        }

        /* SMART NAV */
        .smart-nav {
            display: flex;
            justify-content: space-between;
            padding: 30px 20px;
        }

        .nav-item {
            text-align: center;
        }

        .nav-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* RANKING SECTION (AUTOMATIC VIBE) */
        .section-title {
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 26px;
        }

        .view-all {
            font-size: 12px;
            color: var(--gold);
            font-weight: 700;
            text-decoration: none;
        }

        .ranking-scroll {
            display: flex;
            overflow-x: auto;
            padding: 0 20px;
            gap: 15px;
            scrollbar-width: none;
        }

        .ranking-scroll::-webkit-scrollbar {
            display: none;
        }

        .rank-card {
            min-width: 160px;
            flex: 1;
        }

        .rank-img-box {
            background: var(--gray-light);
            border-radius: 12px;
            aspect-ratio: 1;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .rank-num {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            color: rgba(0, 0, 0, 0.1);
            font-weight: 700;
        }

        .rank-img-box img {
            width: 70%;
        }

        .rank-brand {
            font-size: 10px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
        }

        .rank-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            height: 40px;
            overflow: hidden;
        }

        .rank-score {
            font-size: 12px;
            color: var(--gold);
            font-weight: 700;
        }

        /* FOOTER NAV (MOBILE ONLY) */
        .mobile-footer-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            border-top: 1px solid #eee;
            background: white;
            display: flex;
            padding: 10px 0;
            z-index: 1000;
        }

        .footer-nav-item {
            flex: 1;
            text-align: center;
            font-size: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .footer-nav-label {
            font-size: 9px;
            font-weight: 600;
            color: #888;
            margin-top: 4px;
        }

        .footer-nav-item.active {
            color: var(--gold);
        }

        /* ANIMATIONS & INTERACTIONS */
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px) rotate(15deg);
            }

            to {
                opacity: 1;
                transform: translateX(0) rotate(10deg);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-img {
            animation: slideInRight 1s ease-out both;
        }

        .hero-label,
        .hero-title,
        .hero-btn {
            animation: fadeInUp 0.8s ease-out both;
        }

        .hero-title {
            animation-delay: 0.1s;
        }

        .hero-btn {
            animation-delay: 0.2s;
        }

        /* Tapping Feedback */
        .nav-item,
        .rank-card,
        .footer-nav-item,
        .hero-btn {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
            cursor: pointer;
        }

        .nav-item:active,
        .rank-card:active,
        .footer-nav-item:active {
            transform: scale(0.92);
            opacity: 0.8;
        }

        .hero-btn:active {
            transform: scale(0.95);
        }

        /* Sticky Header Scroll Effect */
        header.scrolled {
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            padding: 10px 20px;
        }

        /* Rank Card Hover (Desktop preview) */
        @media (min-width: 768px) {
            .rank-card:hover {
                transform: translateY(-5px);
            }
        }
    </style>
    <script>
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            // Hiệu ứng click cho vùnav items
            const footerItems = document.querySelectorAll('.footer-nav-item');
            footerItems.forEach(item => {
                item.addEventListener('click', () => {
                    footerItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                });
            });
        });
    </script>
</head>

<body>

    <header>
        <div class="menu-icon"><span></span><span></span><span></span></div>
        <div class="logo">LUX PERFUME</div>
        <div class="search-icon">🔍</div>
    </header>

    <section class="hero">
        <div class="hero-card">
            <img src="https://images.unsplash.com/photo-1594035910387-fea47794261f?auto=format&fit=crop&q=80&w=600"
                class="hero-img" alt="Bleu de Chanel">
            <div class="hero-label">Xu hướng tháng 2</div>
            <h1 class="hero-title">Đỉnh cao của sự thanh lịch</h1>
            <button class="hero-btn">Khám phá ngay</button>
        </div>
    </section>

    <nav class="smart-nav">
        <div class="nav-item">
            <div class="nav-circle">🤵</div>
            <div class="nav-label">Cho Nam</div>
        </div>
        <div class="nav-item">
            <div class="nav-circle">💃</div>
            <div class="nav-label">Cho Nữ</div>
        </div>
        <div class="nav-item">
            <div class="nav-circle">✨</div>
            <div class="nav-label">Unisex</div>
        </div>
        <div class="nav-item">
            <div class="nav-circle">🔥</div>
            <div class="nav-label">Best Seller</div>
        </div>
    </nav>

    <section>
        <div class="section-title">
            <h2>Bảng xếp hạng</h2>
            <a href="#" class="view-all">XEM TẤT CẢ</a>
        </div>
        <div class="ranking-scroll">
            <div class="rank-card">
                <div class="rank-img-box">
                    <span class="rank-num">01</span>
                    <img
                        src="https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&q=80&w=200">
                </div>
                <div class="rank-brand">DIOR</div>
                <div class="rank-name">Sauvage Elixir</div>
                <div class="rank-score">★ 9.4/10</div>
            </div>
            <div class="rank-card">
                <div class="rank-img-box">
                    <span class="rank-num">02</span>
                    <img
                        src="https://images.unsplash.com/photo-1595428707305-ad9a0bf83916?auto=format&fit=crop&q=80&w=200">
                </div>
                <div class="rank-brand">LOUIS VUITTON</div>
                <div class="rank-name">Imagination</div>
                <div class="rank-score">★ 9.2/10</div>
            </div>
            <div class="rank-card">
                <div class="rank-img-box">
                    <span class="rank-num">03</span>
                    <img
                        src="https://images.unsplash.com/photo-1594035910387-fea47794261f?auto=format&fit=crop&q=80&w=200">
                </div>
                <div class="rank-brand">CHANEL</div>
                <div class="rank-name">Bleu de Chanel</div>
                <div class="rank-score">★ 8.9/10</div>
            </div>
        </div>
    </section>

    <div style="height: 100px;"></div> <!-- Spacer cho footer nav -->

    <nav class="mobile-footer-nav">
        <div class="footer-nav-item active">🏠<span class="footer-nav-label">TRANG CHỦ</span></div>
        <div class="footer-nav-item">🏺<span class="footer-nav-label">BỘ SƯU TẬP</span></div>
        <div class="footer-nav-item">📰<span class="footer-nav-label">TIN TỨC</span></div>
        <div class="footer-nav-item">👤<span class="footer-nav-label">TÀI KHOẢN</span></div>
    </nav>

</body>

</html>
